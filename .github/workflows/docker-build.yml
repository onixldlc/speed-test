name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "build/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    paths:
      - "build/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 1.5). Leave empty for auto-increment.'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BASE_VERSION: "1"

permissions:
  contents: read
  packages: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          TAGS=$(skopeo list-tags docker://${{ env.REGISTRY }}/${{ github.repository }} 2>/dev/null | jq -r '.Tags[]?' || echo "")

          HIGHEST_REV=0
          for tag in $TAGS; do
            if [[ $tag =~ ^${BASE_VERSION}\.([0-9]+)$ ]]; then
              REV=${BASH_REMATCH[1]}
              if [[ $REV -gt $HIGHEST_REV ]]; then
                HIGHEST_REV=$REV
              fi
            fi
          done

          NEXT_REV=$((HIGHEST_REV + 1))
          NEW_VERSION="${BASE_VERSION}.${NEXT_REV}"

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

  build-and-push:
    runs-on: ubuntu-latest
    needs: determine-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.determine-version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./build
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
